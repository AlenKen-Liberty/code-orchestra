name: "current_pipeline"
description: "Current workflow: Opus (design) → Codex (coding) → Haiku (review)"
version: "1.0"

# 全局配置
config:
  timeout_per_stage: 300  # 秒
  save_artifacts: true
  artifact_dir: "./artifacts"

# 工作流阶段
stages:
  # Stage 1: 架构设计 (Claude Opus)
  - stage_id: "planning"
    name: "Architecture Planning"
    model: "claude-opus-4-6"
    model_type: "claude_code"
    description: "使用 Opus 生成详细的系统架构设计方案"

    input:
      source: "user_task"

    prompt_template: |
      你是一个资深的系统架构师。

      任务描述：
      {task_description}

      请生成以下内容的详细设计方案：
      1. 系统架构概览（模块、组件、交互）
      2. 核心设计决策与理由
      3. 技术栈选择
      4. 实现步骤（分阶段）
      5. 潜在的风险与mitigation方案

      输出格式：结构化的markdown文档

    output_key: "architecture_plan"
    save_artifact: true

  # Stage 2: 编码实现 (GPT-5.2 Codex)
  - stage_id: "coding"
    name: "Code Implementation"
    model: "gpt-5.2-codex"
    model_type: "codex"
    description: "基于设计生成可运行的代码"

    input:
      source: "planning.architecture_plan"

    prompt_template: |
      你是一个高级的编程专家。

      基于以下系统设计，生成完整的可生产就绪的代码实现：

      {architecture_plan}

      要求：
      1. 代码应该遵循 PEP 8 风格指南（如果是 Python）
      2. 包含完整的错误处理和日志记录
      3. 添加类型注解和文档字符串
      4. 模块化和可维护性优先
      5. 考虑性能优化
      6. 提供 Unit Test 框架

      输出结构：
      - main implementation files
      - test files
      - configuration files
      - README 和使用说明

    output_key: "generated_code"
    save_artifact: true

  # Stage 3: 代码审查 (Claude Haiku)
  - stage_id: "code_review"
    name: "Code Review & Analysis"
    model: "claude-haiku-4-5-20251001"
    model_type: "claude_code"
    description: "代码质量审查、测试覆盖验证和bug识别"

    input:
      - source: "planning.architecture_plan"
        key: "design"
      - source: "coding.generated_code"
        key: "code"

    prompt_template: |
      你是一个资深的代码审查专家。

      设计文档：
      {design}

      请对以下代码进行全面审查：

      {code}

      审查清单：
      1. 代码质量
         - 可读性和可维护性
         - 命名规范
         - 复杂度分析
         - DRY 原则

      2. 功能正确性
         - 是否实现了设计要求
         - 边界条件处理
         - 错误处理完整性

      3. 安全性
         - 输入验证
         - 注入漏洞
         - 敏感信息处理

      4. 测试覆盖
         - Happy path 覆盖度
         - 边界情况测试
         - 错误路径测试
         - 建议补充的测试用例

      5. 性能与资源
         - 时间复杂度
         - 空间复杂度
         - 是否存在内存泄漏风险

      请提供：
      - 发现的主要问题（按严重级别分类）
      - 改进建议
      - 建议补充的测试
      - 是否通过审查的结论

    output_key: "code_review_result"
    save_artifact: true

# 工作流的全局输出结构
output_schema:
  planning:
    - architecture_plan: "string"

  coding:
    - generated_code: "string"

  code_review:
    - review_result: "string"

# 执行配置
execution:
  parallel: false  # 严格按顺序执行
  error_handling: "fail_fast"  # 某个阶段失败则停止
  save_state: true  # 保存状态以便恢复
  state_dir: "./workflow_state"
